version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
    groups:
      cloudflare:
        patterns:
          - "wrangler"
          - "@cloudflare/*"
          - "workers-ai-provider"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      ai:
        patterns:
          - "agents"
          - "ai"
          - "@cloudflare/ai-chat"
          - "@cloudflare/think"

  - package-ecosystem: "npm"
    directory: "/client"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
    groups:
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react*"
      vite:
        patterns:
          - "vite"
          - "@vitejs/*"
